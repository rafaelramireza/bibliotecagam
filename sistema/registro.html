<body>

    <h2> Formulario de registro </h2>

    <form action="./registro.php" method="post">
        
        Nombre:
        <input type="text" name="nombres" id="nombres"><br>
        
        Apellidos:
        <input type="text" name="apellidos" id="apellidos" ><br>
        
        Email: 
        <input type="email" name ="email" id="email"><br>

        Contraseña:
        <input type="password" name="password" id="password"><br>

        Repettir contraseña:
        <input type="password" name="confirmarPassword" id="confirmarPassword"><br>

        Licenciatura:
        <select name="licenciatura" id="licenciatura">
            <option value="">Seleccione su licenciatura</option>

            <option value="Otro">Otro</option>
        </select> <br>

        Semestre:
        <select id="semestre" name="semestre">
            <option value="">Seleccione su semestre</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10">10</option>
        </select><br>

        <button type="submit">Registrarme</button>
    
    </form>
